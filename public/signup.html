<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account — Dukaan</title>
<link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<header class="site-header">
  <div class="header-top">
    <a href="/index.html" class="brand">duk<span>aan</span></a>
    <div style="flex:1;"></div>
    <div class="header-actions">
      <a href="/cart.html">🛒 Cart <span class="cart-badge js-cart-count">0</span></a>
    </div>
  </div>
</header>

<main class="container">
  <div class="form-card">
    <h2>Create Account</h2>
    <p style="color:var(--ink-soft); font-size:0.9rem; margin-top:-8px;">Already have an account? <a href="/login.html" style="color:var(--primary); font-weight:600;">Login</a></p>
    <div id="formError"></div>
    <form id="signupForm">
      <div class="field">
        <label for="name">Full name</label>
        <input type="text" id="name" required>
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" minlength="6" required>
        <small style="color:var(--ink-soft);">At least 6 characters</small>
      </div>
      <button class="btn btn-primary btn-block" type="submit">Create Account</button>
    </form>
  </div>
</main>

<script src="/js/api.js"></script>
<script>
document.getElementById('signupForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errBox = document.getElementById('formError');
  errBox.innerHTML = '';
  try {
    await api.post('/api/auth/signup', {
      name: document.getElementById('name').value,
      email: document.getElementById('email').value,
      password: document.getElementById('password').value,
    });
    window.location.href = '/index.html';
  } catch (err) {
    errBox.innerHTML = `<div class="form-error">${err.message}</div>`;
  }
});
</script>
</body>
</html>
