<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Dukaan</title>
<link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<header class="site-header">
  <div class="header-top">
    <a href="/index.html" class="brand">duk<span>aan</span></a>
    <div style="flex:1;"></div>
    <div class="header-actions">
      <a href="/cart.html">🛒 Cart <span class="cart-badge js-cart-count">0</span></a>
    </div>
  </div>
</header>

<main class="container">
  <div class="form-card">
    <h2>Login</h2>
    <p style="color:var(--ink-soft); font-size:0.9rem; margin-top:-8px;">New here? <a href="/signup.html" style="color:var(--primary); font-weight:600;">Create an account</a></p>
    <div id="formError"></div>
    <form id="loginForm">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" required>
      </div>
      <button class="btn btn-primary btn-block" type="submit">Login</button>
    </form>
    <p class="muted-link">Admin demo login: admin@dukaan.test / admin123</p>
  </div>
</main>

<script src="/js/api.js"></script>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errBox = document.getElementById('formError');
  errBox.innerHTML = '';
  try {
    await api.post('/api/auth/login', {
      email: document.getElementById('email').value,
      password: document.getElementById('password').value,
    });
    const redirect = new URLSearchParams(window.location.search).get('redirect') || '/index.html';
    window.location.href = redirect;
  } catch (err) {
    errBox.innerHTML = `<div class="form-error">${err.message}</div>`;
  }
});
</script>
</body>
</html>
